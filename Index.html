<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คชื่อนักศึกษา แยกกลุ่ม</title>
  <style>
    /* CSS ยกมาจากของเดิมได้เลยครับ */
    body { font-family: Arial, sans-serif; padding: 10px; background-color: #f7fafc; color: #2d3748; margin: 0; }
    .container { max-width: 650px; margin: 10px auto; background: white; padding: 20px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); box-sizing: border-box; }
    h2 { text-align: center; color: #1F497D; margin-bottom: 20px; font-size: 20px; }
    label { font-weight: bold; display: block; margin-top: 15px; color: #4a5568; font-size: 14px; }
    input[type="text"], button, select.tab-select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; font-size: 15px; }
    .tab-select { background-color: #e2e8f0; font-weight: bold; color: #1F497D; cursor: pointer; }
    .search-box { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23a0aec0" class="bi bi-search" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>'); background-repeat: no-repeat; background-position: 12px center; padding-left: 40px !important; border-color: #4F81BD; }
    .table-container { margin-top: 15px; max-height: 380px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; position: relative; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    th { background-color: #1F497D; color: white; position: sticky; top: 0; z-index: 2; }
    .select-status { padding: 6px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 13px; width: 100%; max-width: 85px; }
    .input-note { padding: 6px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 13px; width: 100%; }
    .checkbox-col { text-align: center; width: 45px; }
    .checkbox-item { transform: scale(1.3); cursor: pointer; }
    button { background-color: #1F497D; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
    .loading { text-align: center; color: #a0aec0; font-style: italic; padding: 20px 0; }
    .action-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; }
    .btn-link { cursor: pointer; color: #1F497D; text-decoration: underline; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h2>👥 ระบบเช็คชื่อองค์การเเละอนุ</h2>
    
    <label>🏫 เลือกกลุ่มที่ต้องการเช็คชื่อ:</label>
    <select id="groupSelect" class="tab-select" onchange="switchGroup()">
      <option value="subcommittee">💼 กลุ่มอนุกรรมการ</option>
      <option value="organization">🏢 กลุ่มองค์การนักศึกษา</option>
    </select>

    <label>🔍 ค้นหาชื่อสมาชิกในกลุ่ม:</label>
    <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="พิมพ์ชื่อจริง หรือชื่อเล่นเพื่อกรองรายการ...">

    <div class="action-bar">
      <div>เลือกเฉพาะคน หรือ <span class="btn-link" onclick="selectAll(true)">เลือกทุกคน</span> | <span class="btn-link" onclick="selectAll(false)">ไม่เลือกเลย</span></div>
    </div>

    <div class="table-container">
      <div id="loadingText" class="loading">กำลังดึงรายชื่อจาก Google Sheets...</div>
      <table id="studentTable" style="display: none;">
        <thead>
          <tr>
            <th class="checkbox-col">เลือก</th>
            <th>ชื่อ-สกุล (ชื่อเล่น)</th>
            <th>สถานะ</th>
            <th>หมายเหตุ</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    
    <button id="submitBtn" onclick="submitBatchAttendance()" disabled>รอโหลดข้อมูลสักครู่...</button>
  </div>

  <script>
    // ⚠️ นำลิงก์ Web App URL ที่ได้จากขั้นตอนที่ 1 มาวางตรงนี้ครับ
    const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnSikYrP8U_muQKzrRoH8pB3WpDQ2k4SyhkXCmVp9WII1bC-jRSORdicIr7wjw-Nelgk7JpUe4OBf_DOOTY5upVoHP3ogZTE2H9tUGt2no2N74Dwc_CsjS5LuV4fn4xMwke1feUDEZkcfn7xkW0uUlSEY9qUCohHBD5S-06_qhxEoH3IHYhbsHWmgqCau0GggE6n1MmLHn1c_RmRzUIr0bLjfQg7nNV6cAetF-SaF4k1xgD8uVcjJ9d-Ktt7qfY__oYCqQ1_Ub8OaLSyy2aDG8QROFIqCQ&lib=MhKV7Dd65VTrbsHM-D7cbs_tH5UPOQwcu"; 

    var masterData = {}; 
    var currentGroupList = []; 

    window.onload = function() {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          masterData = data;
          switchGroup();
        })
        .catch(err => {
          document.getElementById("loadingText").innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err;
        });
    };

    function switchGroup() {
      var selectedGroup = document.getElementById("groupSelect").value;
      currentGroupList = masterData[selectedGroup];
      var tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      document.getElementById("searchInput").value = ""; 
      
      if(!currentGroupList || currentGroupList.length === 0) {
        tbody.innerHTML = "<tr><td colspan='4' class='loading'>❌ ไม่พบข้อมูลรายชื่อ</td></tr>";
        return;
      }

      for (var i = 0; i < currentGroupList.length; i++) {
        var id = currentGroupList[i][0]; 
        var name = currentGroupList[i][1];
        var nick = currentGroupList[i][2];
        var idLabel = selectedGroup === "subcommittee" ? "คณะ: " : "รหัส: ";
        
        var row = document.createElement("tr");
        row.setAttribute("data-id", id);
        row.setAttribute("data-name", name);
        row.setAttribute("data-nick", nick);
        row.innerHTML = `
          <td class="checkbox-col"><input type="checkbox" class="checkbox-item" id="chk_${i}"></td>
          <td><b>${name}</b> <span style="color:#718096; font-size:12px;">(${nick})</span><br><small style="color:#a0aec0;">${idLabel}${id}</small></td>
          <td><select class="select-status" id="status_${i}"><option value="มา">🟢 มา</option><option value="สาย">🟡 สาย</option><option value="ลา">🔵 ลา</option><option value="ขาด">🔴 ขาด</option></select></td>
          <td><input type="text" class="input-note" id="note_${i}" placeholder="เหตุผล.."></td>
        `;
        tbody.appendChild(row);
      }
      document.getElementById("loadingText").style.display = "none";
      document.getElementById("studentTable").style.display = "table";
      document.getElementById("submitBtn").disabled = false;
      var groupText = selectedGroup === "subcommittee" ? "อนุกรรมการ" : "องค์การนักศึกษา";
      document.getElementById("submitBtn").innerText = "บันทึกยอดเช็คชื่อของกลุ่ม (" + groupText + ")";
    }

    function filterTable() {
      var query = document.getElementById("searchInput").value.toLowerCase().trim();
      var rows = document.getElementById("tableBody").getElementsByTagName("tr");
      for (var i = 0; i < rows.length; i++) {
        if(!rows[i].getAttribute("data-name")) continue;
        var id = rows[i].getAttribute("data-id").toLowerCase();
        var name = rows[i].getAttribute("data-name").toLowerCase();
        var nick = rows[i].getAttribute("data-nick").toLowerCase();
        rows[i].style.display = (id.includes(query) || name.includes(query) || nick.includes(query)) ? "" : "none";
      }
    }

    function selectAll(bool) {
      var checkboxes = document.getElementsByClassName("checkbox-item");
      for (var i = 0; i < checkboxes.length; i++) {
        if(checkboxes[i].closest("tr").style.display !== "none") checkboxes[i].checked = bool;
      }
    }

    function submitBatchAttendance() {
      var selectedGroup = document.getElementById("groupSelect").value;
      var groupText = selectedGroup === "subcommittee" ? "อนุกรรมการ" : "องค์การนักศึกษา";
      var records = [];
      
      for (var i = 0; i < currentGroupList.length; i++) {
        var chk = document.getElementById("chk_" + i);
        if (chk && chk.checked) {
          records.push({
            id: currentGroupList[i][0],
            name: currentGroupList[i][1],
            nick: currentGroupList[i][2],
            status: document.getElementById("status_" + i).value,
            note: document.getElementById("note_" + i).value
          });
        }
      }
      
      if (records.length === 0) { alert("⚠️ กรุณาเลือกรายชื่อก่อนบันทึกครับ"); return; }
      
      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "กำลังบันทึกข้อมูลเข้า Google Sheets...";
      
      // ส่งข้อมูลกลับไปหา Google Sheets API ด้วยวิธีแบบสากล
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ records: records, groupName: groupText })
      })
      .then(res => res.json())
      .then(res => {
        alert(res.message);
        location.reload();
      })
      .catch(err => {
        alert("❌ เกิดข้อผิดพลาดในการบันทึก: " + err);
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
